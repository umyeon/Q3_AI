<title>AI 시대의 노동</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
body{margin:0;background:#f3f3ef;color:#202020;font-family:'Pretendard', sans-serif}
.wrap{max-width:760px;margin:auto;padding:24px 16px 80px}

/* 초록색 원(.hero:before)이 글자 뒤로 가도록 z-index 설정 */
.hero{position:relative; z-index: 1}
.hero:before{content:'';position:absolute;left:-60px;top:-100px;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(110,214,110,.95) 0%,rgba(110,214,110,.55) 35%,rgba(110,214,110,0) 75%);z-index: -1}

/* 우측 정렬을 위해 wrapper 추가 및 뱃지 스타일 수정 */
.eyebrow-wrapper{display:flex; justify-content:flex-end}
.eyebrow{display:inline-flex;padding:8px 14px;border-radius:999px;background:#000;color:#fff;font-size:11px}

/* 메인 타이틀 크기 57px로 지정 */
.hero-title{font-size:57px;line-height:1.15;letter-spacing:-.05em;color:transparent;-webkit-text-stroke:1.3px #4f4f4f;margin:28px 0}

/* 메인 타이틀과 부타이틀(hero-question) 사이의 간격을 늘리기 위해 margin-top 상향 조정 */
.hero-question{font-size:24px;font-weight:700;line-height:1.45;margin-top:64px}
.hero-text{line-height:1.9;color:#444}

/* 아이콘과 텍스트를 수직 가운데 정렬하고 모바일 대응 */
.notice{display:flex;align-items:center;justify-content:center;margin:40px 0 12px;padding:14px 16px;background:#fafaf8;border:1px solid #d9d9d5;border-radius:14px;font-size:13px;letter-spacing:-0.03em;white-space:nowrap;text-overflow:ellipsis;overflow:hidden}

.section{margin-top:72px}.section-no{font-size:12px;color:#7a7a7a;letter-spacing:.18em}.section-title{font-size:34px;font-weight:700}.section-desc{color:#6b6b6b}
.card{display:flex;gap:14px;align-items:center;background:#fafaf8;border:1px solid #ddd;border-radius:18px;padding:14px;margin:12px 0}
.cover{width:72px;height:102px;object-fit:cover;border-radius:10px}

/* 가독성 향상을 위해 도서명, 저자 정보 간 미세 여백(margin-bottom) 추가 */
.title{font-weight:700;margin-bottom:6px;line-height:1.35}
.author{font-size:14px;color:#6b6b6b;margin-bottom:4px}
.call{font-size:14px;color:#6b6b6b}
</style></head><body><main class='wrap'>
