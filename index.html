<!DOCTYPE html>
<html lang='ko'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>어둠 속의 목격자들</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#050507;color:#f0ede8;font-family:'Pretendard',sans-serif}

  .hero{
    position:relative;
    min-height:100svh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .hero::before{
    content:'';
    position:absolute;inset:0;
    background:#050507;
    z-index:0;
  }
  .hero::after{
    content:'';
    position:absolute;inset:0;
    background:
      radial-gradient(ellipse 70% 40% at 52% 105%,  rgba(60,180,80,.28) 0%,  transparent 65%),
      radial-gradient(ellipse 40% 25% at 52% 108%,  rgba(90,210,90,.18) 0%,  transparent 55%),
      radial-gradient(ellipse 90% 50% at 50% 100%,  rgba(30,90,40,.22)  0%,  transparent 70%);
    z-index:0;
  }
  .hero-dark{
    position:absolute;inset:0;
    background:
      radial-gradient(ellipse 60% 55% at 50% 0%, rgba(5,5,7,0) 0%, rgba(5,5,7,.5) 60%, rgba(5,5,7,.95) 100%);
    z-index:1;
  }
  .hero-glow{
    position:absolute;inset:0;
    background:
      radial-gradient(ellipse 35% 50% at 88% 62%, rgba(110,40,160,.2) 0%, transparent 70%),
      radial-gradient(ellipse 25% 30% at 12% 55%, rgba(40,80,30,.15)  0%, transparent 65%);
    z-index:1;
  }
  .hero-top{
    position:absolute;inset:0;
    background:
      radial-gradient(ellipse 80% 30% at 50% -5%, rgba(200,210,200,.04) 0%, transparent 70%);
    z-index:1;
  }

  .eyebrow-wrap{
    position:relative;z-index:10;
    display:flex;justify-content:flex-end;
    padding:20px 20px 0;
  }
  .eyebrow{
    display:inline-flex;
    padding:7px 14px;
    border-radius:999px;
    background:#f0ede8;
    color:#0a0a0a;
    font-size:11px;
    letter-spacing:.03em;
    font-weight:500;
  }

  .hero-body{
    position:relative;z-index:10;
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:0 24px 52px;
  }
  .eng-caption{
    font-size:12px;
    letter-spacing:.25em;
    color:#8a9e8a;
    text-transform:uppercase;
    margin-bottom:16px;
  }
  .hero-title{
    font-family:'Batang','바탕','Georgia','Times New Roman',serif;
    font-size:clamp(44px,12vw,96px);
    font-weight:700;
    line-height:1.05;
    letter-spacing:-.02em;
    color:#ffffff;
    white-space:nowrap;
    margin-bottom:32px;
  }
  .hero-title .sub{
    font-family:'Pretendard',sans-serif;
    font-size:clamp(14px,3.5vw,22px);
    font-weight:300;
    letter-spacing:.06em;
    color:rgba(255,255,255,.55);
    display:block;
    margin-top:14px;
    white-space:normal;
  }
  .hero-desc{
    max-width:460px;
    font-size:15px;
    line-height:1.9;
    color:rgba(255,255,255,.55);
  }
  .hero-desc p+p{margin-top:.85em}

  hr.divider{border:none;border-top:1px solid rgba(255,255,255,.1);margin:0 20px}
  .notice{display:flex;align-items:center;gap:10px;margin:28px 20px;padding:14px 18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:14px;font-size:13px;color:rgba(255,255,255,.45);letter-spacing:-.02em}

  .wrap{max-width:760px;margin:auto;padding:0 16px 80px}
  .section{margin-top:64px}
  .section-no{font-size:11px;color:#6b6560;letter-spacing:.2em;text-transform:uppercase;margin-bottom:6px}
  .section-title{font-size:32px;font-weight:800;color:#f0ede8;margin-bottom:4px}
  .section-desc{font-size:14px;color:#7a7570;margin-bottom:20px}

  .card{display:flex;gap:16px;align-items:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:16px;margin:10px 0;transition:background .2s}
  .card:hover{background:rgba(255,255,255,.08)}
  .cover{width:72px;height:102px;object-fit:cover;border-radius:10px;flex-shrink:0}
  .title{font-weight:700;margin-bottom:6px;line-height:1.35;color:#f0ede8}
